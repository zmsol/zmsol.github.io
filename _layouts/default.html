<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} — Z&M Solutions{% else %}Z&M Solutions{% endif %}</title>
    <meta name="description" content="{{ page.description | default: 'Faster Workflows for Professional Teams' }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}Z&M Solutions{% endif %}">
    <meta property="og:description" content="{{ page.description | default: 'Faster Workflows for Professional Teams' }}">
    <meta property="og:site_name" content="Z&M Solutions LLC">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blood-orange: #AC1D00;
            --midnight-navy: #0A1121;
            --cool-surface: #F5F6F8;
            --deep-charcoal: #1E293B;
            --white: #FFFFFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            line-height: 1.7;
            color: var(--deep-charcoal);
            background: var(--cool-surface);
        }
        /* Brand header bar */
        .brand-bar {
            background: var(--midnight-navy);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .brand-name {
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--white);
        }
        .brand-divider {
            width: 2px;
            height: 18px;
            background: rgba(255,255,255,0.15);
        }
        .brand-tag {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255,255,255,0.5);
        }
        /* Orange accent strip */
        .accent-strip { height: 4px; background: var(--blood-orange); }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--white);
            padding: 2.5rem 2rem;
        }
        @media (max-width: 600px) { .container { padding: 1.5rem; } }
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--blood-orange);
            text-decoration: none;
        }
        .back-link:hover { color: var(--midnight-navy); }
        h1 {
            font-size: 1.8rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 0.5rem;
            color: var(--midnight-navy);
        }
        h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 2rem 0 0.75rem;
            color: var(--midnight-navy);
            border-bottom: 2px solid var(--blood-orange);
            padding-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }
        h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 1.5rem 0 0.5rem;
            color: var(--deep-charcoal);
        }
        p { margin: 0 0 1rem; }
        ul, ol { margin: 0 0 1rem 1.5rem; }
        li { margin-bottom: 0.3rem; }
        strong { color: var(--midnight-navy); }
        blockquote {
            border-left: 4px solid var(--blood-orange);
            background: var(--cool-surface);
            margin: 1rem 0;
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            color: var(--deep-charcoal);
        }
        code {
            background: var(--cool-surface);
            padding: 0.15rem 0.4rem;
            font-size: 0.9em;
            font-family: "SF Mono", Consolas, "Liberation Mono", monospace;
        }
        pre {
            background: var(--cool-surface);
            padding: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
            border: 1px solid #e0e0e0;
        }
        pre code { background: none; padding: 0; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 0.5rem 0.75rem;
            text-align: left;
        }
        th {
            background: var(--midnight-navy);
            color: var(--white);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        tr:nth-child(even) td { background: var(--cool-surface); }
        hr { border: none; border-top: 2px solid var(--blood-orange); margin: 2rem 0; }
        a { color: var(--blood-orange); font-weight: 600; text-decoration: none; }
        a:hover { text-decoration: underline; }
        footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #e0e0e0;
            font-size: 0.8rem;
            color: #888;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        footer a { color: var(--blood-orange); font-weight: 600; }
        .doc-list { list-style: none; margin: 1.5rem 0; }
        .doc-list li {
            padding: 1rem 0;
            border-bottom: 1px solid var(--cool-surface);
        }
        .doc-list li a { font-weight: 700; font-size: 1.05rem; }
        .doc-list li .desc {
            display: block;
            font-weight: 400;
            font-size: 0.9rem;
            color: var(--deep-charcoal);
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>
    <div class="brand-bar">
        <svg width="28" height="28" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="50" fill="#AC1D00"/>
        </svg>
        <span class="brand-name">Z&amp;M SOLUTIONS</span>
        <span class="brand-divider"></span>
        <span class="brand-tag">Operational Technology</span>
    </div>
    <div class="accent-strip"></div>
    <div class="container">
        <a class="back-link" href="{{ '/' | relative_url }}">← Home</a>
        {{ content }}
        <footer>
            <p>Z&amp;M SOLUTIONS LLC — <a href="{{ '/' | relative_url }}">ZMSOL.GITHUB.IO</a></p>
        </footer>
    </div>
</body>
</html>
